name: Grauss setup

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: Cloud provider
        required: true
        type: choice
        options:
          - azure
          - aws
          - gcp
          - oci
          - ovh
      project:
        description: >
          Project name — used as TF_VAR_project.
          Lowercase alphanumeric and hyphens only (e.g. my-project).
        required: true
        type: string
        default: my-project
      image_version:
        description: Grauss engine image version (e.g. v0.1.0 or latest)
        required: true
        type: string
        default: latest

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate project name
        run: |
          PROJECT="${{ inputs.project }}"
          if ! echo "$PROJECT" | grep -qE '^[a-z0-9][a-z0-9-]*$'; then
            echo "::error::Project name must be lowercase alphanumeric with hyphens and start with a letter or digit. Got: $PROJECT"
            exit 1
          fi

      - name: Write grauss.json
        run: |
          TEMPLATE_VERSION="$(jq -r '.template_version' grauss.json)"
          cat > grauss.json <<EOF
          {
            "cloud": "${{ inputs.cloud }}",
            "project": "${{ inputs.project }}",
            "image_version": "${{ inputs.image_version }}",
            "template_version": "$TEMPLATE_VERSION"
          }
          EOF
          sed -i 's/^  //' grauss.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add grauss.json
          git diff --staged --quiet && echo "Nothing to commit." || \
            git commit -m "chore: setup ${{ inputs.cloud }} project ${{ inputs.project }}"
          git push

      - name: Summary
        run: |
          CLOUD="${{ inputs.cloud }}"
          PROJECT="${{ inputs.project }}"
          TEMPLATE_VERSION="$(jq -r '.template_version' grauss.json)"

          echo "### Grauss setup complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--|--|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Cloud** | \`$CLOUD\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Project** | \`$PROJECT\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image version** | \`${{ inputs.image_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Template version** | \`$TEMPLATE_VERSION\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Next steps" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Set repository variable **\`GRAUSS_IMAGE_ORG\`** (org/user publishing Grauss engine images)." >> "$GITHUB_STEP_SUMMARY"
          echo "2. Configure the **$CLOUD** credential secrets in *Settings → Secrets and variables → Actions* (see \`README.md\`)." >> "$GITHUB_STEP_SUMMARY"
          echo "3. Replace all \`REPLACE_WITH_*\` placeholders in \`data/\` with your actual values." >> "$GITHUB_STEP_SUMMARY"
          echo "4. Update \`data/backend.tf.json\` with your remote state backend details." >> "$GITHUB_STEP_SUMMARY"
