name: Grauss setup

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: Cloud provider
        required: true
        type: choice
        options:
          - azure
          - aws
          - gcp
          - oci
          - ovh
      engine:
        description: IaC engine
        required: true
        type: choice
        options:
          - terraform
          - opentofu

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Derive and validate project name
        id: project
        run: |
          PROJECT="$(echo "${{ github.event.repository.name }}" | tr '[:upper:]_' '[:lower:]-')"
          if ! echo "$PROJECT" | grep -qE '^[a-z0-9][a-z0-9-]*$'; then
            echo "::error::Repository name '${{ github.event.repository.name }}' cannot be used as a project name. Rename the repository to use lowercase alphanumeric characters and hyphens only."
            exit 1
          fi
          echo "name=$PROJECT" >> "$GITHUB_OUTPUT"

      - name: Write grauss.json
        run: |
          TEMPLATE_VERSION="$(jq -r '.template_version' grauss.json)"
          cat > grauss.json <<EOF
          {
            "cloud": "${{ inputs.cloud }}",
            "engine": "${{ inputs.engine }}",
            "project": "${{ steps.project.outputs.name }}",
            "template_version": "$TEMPLATE_VERSION"
          }
          EOF
          sed -i 's/^  //' grauss.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add grauss.json
          git diff --staged --quiet && echo "Nothing to commit." || \
            git commit -m "chore: setup ${{ inputs.cloud }}/${{ inputs.engine }} project ${{ steps.project.outputs.name }}"
          git push

      - name: Summary
        run: |
          CLOUD="${{ inputs.cloud }}"
          ENGINE="${{ inputs.engine }}"
          PROJECT="${{ steps.project.outputs.name }}"
          TEMPLATE_VERSION="$(jq -r '.template_version' grauss.json)"

          echo "### Grauss setup complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--|--|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Cloud** | \`$CLOUD\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Engine** | \`$ENGINE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Project** | \`$PROJECT\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Template version** | \`$TEMPLATE_VERSION\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Next steps" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Set repository variable **\`GRAUSS_IMAGE_ORG\`** (org/user publishing Grauss engine images)." >> "$GITHUB_STEP_SUMMARY"
          echo "2. Configure the **$CLOUD** credential secrets in *Settings → Secrets and variables → Actions* (see \`README.md\`)." >> "$GITHUB_STEP_SUMMARY"
          echo "3. Add JSON resource files under \`data/\` following the layout in \`README.md\`." >> "$GITHUB_STEP_SUMMARY"
