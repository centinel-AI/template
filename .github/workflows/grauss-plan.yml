name: Grauss plan

on:
  pull_request:
    paths:
      - 'data/**'
      - 'grauss.json'

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Read grauss.json
        id: cfg
        run: |
          CLOUD=$(jq -r '.cloud' grauss.json)
          PROJECT=$(jq -r '.project' grauss.json)
          VERSION=$(jq -r '.image_version' grauss.json)
          if [ -z "$CLOUD" ] || [ "$CLOUD" = "null" ]; then
            echo "::error::grauss.json is not configured. Run the grauss-setup workflow first."
            exit 1
          fi
          echo "cloud=$CLOUD"     >> "$GITHUB_OUTPUT"
          echo "project=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${{ vars.GRAUSS_IMAGE_ORG }}/grauss-${CLOUD}-terraform:${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Pull engine image
        run: docker pull "${{ steps.cfg.outputs.image }}"

      # ── Azure ──────────────────────────────────────────────────────────────────
      - name: Plan — Azure
        if: steps.cfg.outputs.cloud == 'azure'
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/data:/app/workspace/data" \
            -e TF_VAR_project="${{ steps.cfg.outputs.project }}" \
            -e ARM_USE_AZUREAD="${{ secrets.ARM_USE_AZUREAD }}" \
            -e ARM_CLIENT_ID="${{ secrets.ARM_CLIENT_ID }}" \
            -e ARM_CLIENT_SECRET="${{ secrets.ARM_CLIENT_SECRET }}" \
            -e ARM_TENANT_ID="${{ secrets.ARM_TENANT_ID }}" \
            -e ARM_SUBSCRIPTION_ID="${{ secrets.ARM_SUBSCRIPTION_ID }}" \
            "${{ steps.cfg.outputs.image }}" \
            terraform plan -no-color 2>&1 | tee /tmp/plan.txt
          echo "PLAN_OUTPUT<<EOF" >> "$GITHUB_ENV"
          tail -100 /tmp/plan.txt >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      # ── AWS ────────────────────────────────────────────────────────────────────
      - name: Plan — AWS
        if: steps.cfg.outputs.cloud == 'aws'
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/data:/app/workspace/data" \
            -e TF_VAR_project="${{ steps.cfg.outputs.project }}" \
            -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -e AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN }}" \
            -e AWS_DEFAULT_REGION="${{ secrets.AWS_DEFAULT_REGION }}" \
            "${{ steps.cfg.outputs.image }}" \
            terraform plan -no-color 2>&1 | tee /tmp/plan.txt
          echo "PLAN_OUTPUT<<EOF" >> "$GITHUB_ENV"
          tail -100 /tmp/plan.txt >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      # ── GCP ────────────────────────────────────────────────────────────────────
      - name: Plan — GCP
        if: steps.cfg.outputs.cloud == 'gcp'
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/data:/app/workspace/data" \
            -e TF_VAR_project="${{ steps.cfg.outputs.project }}" \
            -e GOOGLE_CREDENTIALS="${{ secrets.GOOGLE_CREDENTIALS }}" \
            -e GOOGLE_PROJECT="${{ secrets.GOOGLE_PROJECT }}" \
            -e GOOGLE_REGION="${{ secrets.GOOGLE_REGION }}" \
            -e GOOGLE_ZONE="${{ secrets.GOOGLE_ZONE }}" \
            "${{ steps.cfg.outputs.image }}" \
            terraform plan -no-color 2>&1 | tee /tmp/plan.txt
          echo "PLAN_OUTPUT<<EOF" >> "$GITHUB_ENV"
          tail -100 /tmp/plan.txt >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      # ── OCI ────────────────────────────────────────────────────────────────────
      - name: Write OCI private key
        if: steps.cfg.outputs.cloud == 'oci'
        run: |
          printf '%s' "${{ secrets.OCI_PRIVATE_KEY }}" > /tmp/oci_key.pem
          chmod 600 /tmp/oci_key.pem

      - name: Plan — OCI
        if: steps.cfg.outputs.cloud == 'oci'
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/data:/app/workspace/data" \
            -v "/tmp/oci_key.pem:/tmp/oci_key.pem:ro" \
            -e TF_VAR_project="${{ steps.cfg.outputs.project }}" \
            -e OCI_TENANCY_OCID="${{ secrets.OCI_TENANCY_OCID }}" \
            -e OCI_USER_OCID="${{ secrets.OCI_USER_OCID }}" \
            -e OCI_FINGERPRINT="${{ secrets.OCI_FINGERPRINT }}" \
            -e OCI_REGION="${{ secrets.OCI_REGION }}" \
            -e OCI_PRIVATE_KEY_FILE="/tmp/oci_key.pem" \
            "${{ steps.cfg.outputs.image }}" \
            terraform plan -no-color 2>&1 | tee /tmp/plan.txt
          echo "PLAN_OUTPUT<<EOF" >> "$GITHUB_ENV"
          tail -100 /tmp/plan.txt >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Cleanup OCI key
        if: steps.cfg.outputs.cloud == 'oci' && always()
        run: rm -f /tmp/oci_key.pem

      # ── OVH ────────────────────────────────────────────────────────────────────
      - name: Plan — OVH
        if: steps.cfg.outputs.cloud == 'ovh'
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/data:/app/workspace/data" \
            -e TF_VAR_project="${{ steps.cfg.outputs.project }}" \
            -e OVH_ENDPOINT="${{ secrets.OVH_ENDPOINT }}" \
            -e OVH_APPLICATION_KEY="${{ secrets.OVH_APPLICATION_KEY }}" \
            -e OVH_APPLICATION_SECRET="${{ secrets.OVH_APPLICATION_SECRET }}" \
            -e OVH_CONSUMER_KEY="${{ secrets.OVH_CONSUMER_KEY }}" \
            -e TF_VAR_ovh_service_name="${{ secrets.OVH_SERVICE_NAME }}" \
            -e TF_VAR_ovh_s3_region="${{ secrets.OVH_S3_REGION }}" \
            -e TF_VAR_ovh_s3_endpoint="${{ secrets.OVH_S3_ENDPOINT }}" \
            -e TF_VAR_ovh_s3_access_key="${{ secrets.OVH_S3_ACCESS_KEY }}" \
            -e TF_VAR_ovh_s3_secret_key="${{ secrets.OVH_S3_SECRET_KEY }}" \
            "${{ steps.cfg.outputs.image }}" \
            terraform plan -no-color 2>&1 | tee /tmp/plan.txt
          echo "PLAN_OUTPUT<<EOF" >> "$GITHUB_ENV"
          tail -100 /tmp/plan.txt >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Post plan to PR
        if: always() && env.PLAN_OUTPUT != ''
        uses: actions/github-script@v7
        with:
          script: |
            const output = process.env.PLAN_OUTPUT;
            const cloud = '${{ steps.cfg.outputs.cloud }}';
            const project = '${{ steps.cfg.outputs.project }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform plan — \`${cloud}/${project}\`\n\n<details><summary>Show plan</summary>\n\n\`\`\`\n${output}\n\`\`\`\n</details>`
            });
